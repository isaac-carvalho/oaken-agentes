stages:
  prepare:
    cmd: python src/prepare.py
    outs:
      - data/processed.csv
  train:
    cmd: python src/train.py
    deps:
      - data/processed.csv
      - src/train.py
    outs:
      - models/model.pkl
    metrics:
      - metrics/train.json:
          cache: false
  evaluate:
    cmd: python src/evaluate.py
    deps:
      - models/model.pkl
      - data/processed.csv
    metrics:
      - metrics/eval.json:
          cache: false
